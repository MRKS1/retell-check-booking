services:
  - type: web
    name: check-availability-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: CALENDAR_PROVIDER
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: DATABASE_PROVIDER
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MANAGE_CODE_SECRET
        sync: false
      - key: NODE_VERSION
        value: 24.14.0
